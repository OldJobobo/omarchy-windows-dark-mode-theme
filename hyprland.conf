# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.
#

layerrule = no_anim off, match:namespace walker


$activeBorderColor = rgb(0078d4)

general {
    col.active_border = $activeBorderColor
}

group {
    col.border_active = $activeBorderColor
}


animations {
      enabled = yes
      bezier = myEase, 0.22, 1, 0.36, 1
      animation = layers, 1, 6, myEase, slide
      animation = layersIn, 1, 6, myEase, slide
      animation = layersOut, 1, 6, myEase, slide
  }

